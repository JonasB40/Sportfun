    <div class="pagina-inhoud">

        <select class="filter-select" id="filter-locatie">
          <option value="">Binnen &amp; buiten</option>
          <option value="binnen">Enkel binnen</option>

        <select class="filter-select" id="filter-moeilijkheid">
          <option value="">Alle moeilijkheden</option>

      <!-- Tabs: Alle fiches / Goed te keuren (enkel voor admins) -->

<!-- Modal: Fiche detail -->
<div class="modal-overlay verborgen" id="fiche-detail-overlay">

    <div class="modal-header">
      <h2 id="fiche-detail-titel">Activiteitsfiche</h2>
      <button class="modal-sluiten" aria-label="Sluiten">✕</button>
    </div>
    <div class="modal-lichaam" id="fiche-detail-inhoud"></div>
  </div>
</div>

<!-- Modal: Nieuwe fiche aanmaken -->
<div class="modal-overlay verborgen" id="nieuwe-fiche-overlay">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 id="nieuwe-fiche-titel">Nieuwe fiche aanmaken</h2>
      <button class="modal-sluiten" aria-label="Sluiten">✕</button>
    </div>
    <div class="modal-lichaam">
      <div id="nieuwe-fiche-info" style="border-radius:8px;padding:10px 14px;font-size:0.82rem;margin-bottom:20px"></div>
      <form id="fiche-formulier" novalidate>
        <div id="fiche-formulier-inhoud"></div>
        <div class="modal-voetlijn" style="border:none;padding:0;margin-top:8px">
          <button type="button" class="knop knop-omtrek" id="fiche-annuleren">Annuleren</button>
          <button type="submit" class="knop knop-accent" id="fiche-indienen-knop">Fiche toevoegen</button>
        </div>
      </form>
    </div>
  </div>

<div id="toast-container"></div>

<script type="module">
  import { supabase } from './js/supabase.js?v=1780304789425';
  import { checkSessie, haalProfielOp, vulNavigatieIn, initialiseerNotificatieBel, initialiseerContractBadge } from './js/auth.js?v=1780304789425';
  import {
    haalFichesOp, haalFicheOp, filterFiches,
    renderFicheKaart, renderFicheDetail,
    slaFicheVoorstelOp, werkFicheStatusBij, werkFicheBij, verwijderFiche,
    bouwFicheFormulier, leesFormulierWaarden, vulFormulierMetFiche,
    initialiseerTagInvoer, laadMateriaalTags,
    uploadFichesFoto, verwijderFichesFoto, renderFotosRaster
  } from './js/fiches.js?v=1780304789425';
  import { initialiseerModals, initialiseerHamburger, openModal, sluitModal, toonToast } from './js/utils.js?v=1780304789425';

  let huidigProfiel  = null;
  let alleFiches     = [];
  let isBeheerder    = false;
  let isAdmin        = false;
  let actiefFicheTab = 'alle'; // 'alle' | 'voorstel'
  let bewerkFicheID  = null;   // ID van fiche die bewerkt wordt (null = nieuw)

  async function init() {
    const gebruiker = await checkSessie();
    if (!gebruiker) return;

    huidigProfiel = await haalProfielOp(gebruiker.id);
    if (!huidigProfiel) return;

    isBeheerder = ['admin', 'coordinator'].includes(huidigProfiel.rol);
    isAdmin     = huidigProfiel.rol === 'admin';

    vulNavigatieIn(huidigProfiel);
    await initialiseerNotificatieBel(huidigProfiel.id);
    initialiseerContractBadge(huidigProfiel.id);
    initialiseerHamburger();
    initialiseerModals();

    // Bouw nieuw-fiche formulier
    document.getElementById('fiche-formulier-inhoud').innerHTML = bouwFicheFormulier();
    initialiseerTagInvoer();

    // Modal-tekst aanpassen op basis van rol
    if (isBeheerder) {
      document.getElementById('nieuwe-fiche-info').style.cssText =
        'background:rgba(20,136,105,0.08);border:1px solid rgba(20,136,105,0.2);color:var(--kleur-middengroen)';
      document.getElementById('nieuwe-fiche-info').textContent =
        '✓ Jouw fiche wordt meteen goedgekeurd en zichtbaar voor iedereen.';
    } else {
      document.getElementById('nieuwe-fiche-info').style.cssText =
        'background:rgba(20,136,105,0.08);border:1px solid rgba(20,136,105,0.2);color:var(--kleur-middengroen)';
      document.getElementById('nieuwe-fiche-info').textContent =
        'ℹ️ Je fiche wordt ingediend ter goedkeuring bij een coördinator of beheerder.';
      document.getElementById('fiche-indienen-knop').textContent = 'Fiche indienen';
    }

    // Toon "Goed te keuren" tab enkel voor beheerders
    if (isBeheerder) {
      document.getElementById('fiche-tabs').classList.remove('verborgen');
      initialiseerFicheTabs();
    }

    await laadFiches();
    initialiseerFilters();
    initialiseerFormulier();
  }

  function initialiseerFicheTabs() {
    document.querySelectorAll('[data-fiche-tab]').forEach(knop => {
      knop.addEventListener('click', () => {
        document.querySelectorAll('[data-fiche-tab]').forEach(k => k.classList.remove('actief'));
        knop.classList.add('actief');
        actiefFicheTab = knop.dataset.ficheTab;
        renderFiches(alleFiches);
      });
    });
  }

  // ── Fiches laden ──
  async function laadFiches() {
    document.getElementById('laad-fiches').classList.remove('verborgen');
    document.getElementById('fiches-raster').innerHTML = '';

    alleFiches = await haalFichesOp(isBeheerder, huidigProfiel.id);
    document.getElementById('laad-fiches').classList.add('verborgen');

    renderFiches(alleFiches);
  }

  // Thema-volgorde en labels
  const THEMA_VOLGORDE = ['waterspelen', 'balspelen', 'tikspellen', 'estafettes', 'rustig_concentratie'];
  const THEMA_ICOON    = { waterspelen: '💧', balspelen: '⚽', tikspellen: '🏃', estafettes: '🏁', rustig_concentratie: '🧩' };
  const THEMA_NAAM     = { waterspelen: 'Waterspelen', balspelen: 'Balspelen', tikspellen: 'Tikspellen', estafettes: 'Estafettes', rustig_concentratie: 'Rustig & Concentratie' };

  function renderFiches(fiches) {
    const container = document.getElementById('fiches-raster');
    const geen      = document.getElementById('geen-fiches');
    const teller    = document.getElementById('resultaat-teller');

    // Bijwerk badge voor "Goed te keuren"
    if (isBeheerder) {
      const aantalVoorstel = alleFiches.filter(f => f.status === 'voorstel').length;
      const badge = document.getElementById('voorstel-badge');
      if (badge) badge.textContent = aantalVoorstel;
    }

    // Pas tab-filter toe
    let getoond = fiches;
    if (actiefFicheTab === 'voorstel') {
      getoond = fiches.filter(f => f.status === 'voorstel');
    }

    teller.textContent = `${getoond.length} fiche${getoond.length !== 1 ? 's' : ''} gevonden`;

    if (getoond.length === 0) {
      container.innerHTML = '';
      geen.classList.remove('verborgen');
      return;
    }

    geen.classList.add('verborgen');

    // Groepeer per thema
    const perThema = new Map();
    THEMA_VOLGORDE.forEach(t => perThema.set(t, []));
    perThema.set('__geen__', []);

    for (const f of getoond) {
      const t = THEMA_VOLGORDE.includes(f.thema) ? f.thema : '__geen__';
      perThema.get(t).push(f);
    }

    let html = '';
    for (const [thema, lijst] of perThema) {
      if (lijst.length === 0) continue;
      const isGeen  = thema === '__geen__';
      const icoon   = isGeen ? '📋' : THEMA_ICOON[thema];
      const naam    = isGeen ? 'Overige fiches' : THEMA_NAAM[thema];
      html += `
        <div class="thema-sectie">
          <div class="thema-sectie-header">
            <span>${icoon} ${naam}</span>
            <span class="thema-sectie-count">${lijst.length} fiche${lijst.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="fiches-raster-grid">
            ${lijst.map(f => renderFicheKaart(f, isBeheerder)).join('')}
          </div>
        </div>`;
    }

    container.innerHTML = html;

    container.querySelectorAll('.fiche-kaart').forEach(kaart => {
      kaart.addEventListener('click', () => openFicheDetail(kaart.dataset.id));
      kaart.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') openFicheDetail(kaart.dataset.id);
      });
    });
  }

  // ── Fiche detail ──
  async function openFicheDetail(ficheID) {
    const fiche = await haalFicheOp(ficheID);
    if (!fiche) { toonToast('Fiche niet gevonden.', 'fout'); return; }

    document.getElementById('fiche-detail-titel').textContent = fiche.naam;
    document.getElementById('fiche-detail-inhoud').innerHTML  = renderFicheDetail(fiche, isBeheerder, isAdmin);
    openModal('fiche-detail-overlay');

    // Goedkeuren / afwijzen
    document.getElementById('keur-goed-knop')?.addEventListener('click', async () => {
      const succes = await werkFicheStatusBij(ficheID, 'goedgekeurd');
      if (succes) { sluitModal('fiche-detail-overlay'); await laadFiches(); }
    });
    document.getElementById('keur-af-knop')?.addEventListener('click', async () => {
      const succes = await werkFicheStatusBij(ficheID, 'afgekeurd');
      if (succes) { sluitModal('fiche-detail-overlay'); await laadFiches(); }
    });

    // Bewerken (enkel voor beheerders)
    document.getElementById('bewerk-fiche-knop')?.addEventListener('click', () => {
      sluitModal('fiche-detail-overlay');
      openFicheFormulierBewerkModus(fiche);
    });

    // Verwijderen (enkel voor beheerders)
    document.getElementById('verwijder-fiche-knop')?.addEventListener('click', async () => {
      if (!confirm(`Fiche "${fiche.naam}" permanent verwijderen? Dit kan niet ongedaan worden.`)) return;
      const succes = await verwijderFiche(ficheID);
      if (succes) { sluitModal('fiche-detail-overlay'); await laadFiches(); }
    });
  }

  function openFicheFormulierBewerkModus(fiche) {
    bewerkFicheID = fiche.id;
    document.getElementById('nieuwe-fiche-titel').textContent = 'Fiche bewerken';
    document.getElementById('nieuwe-fiche-info').style.cssText =
      'background:rgba(20,136,105,0.08);border:1px solid rgba(20,136,105,0.2);color:var(--kleur-middengroen)';
    document.getElementById('nieuwe-fiche-info').textContent =
      '✏️ Je bewerkt een bestaande fiche. Wijzigingen zijn meteen zichtbaar.';
    document.getElementById('fiche-indienen-knop').textContent = 'Opslaan';
    vulFormulierMetFiche(fiche);
    openModal('nieuwe-fiche-overlay');
  }

  // ── Filters ──
  function initialiseerFilters() {
    const zoek      = document.getElementById('zoek-invoer');
    const thema     = document.getElementById('filter-thema');
    const categorie = document.getElementById('filter-categorie');
    const leeftijd  = document.getElementById('filter-leeftijd');
    const locatie   = document.getElementById('filter-locatie');
    const moeilijk  = document.getElementById('filter-moeilijkheid');

    function pas_filters_toe() {
      const gefilterd = filterFiches(alleFiches, zoek.value, {
        thema:          thema.value || undefined,
        categorie:      categorie.value || undefined,
        leeftijdsgroep: leeftijd.value || undefined,
        locatie:        locatie.value || undefined,
        moeilijkheid:   moeilijk.value || undefined,
      });
      renderFiches(gefilterd);
    }

    zoek.addEventListener('input', pas_filters_toe);
    thema.addEventListener('change', pas_filters_toe);
    categorie.addEventListener('change', pas_filters_toe);
    leeftijd.addEventListener('change', pas_filters_toe);
    locatie.addEventListener('change', pas_filters_toe);
    moeilijk.addEventListener('change', pas_filters_toe);

    document.getElementById('wis-filters')?.addEventListener('click', () => {
      zoek.value = '';
      thema.value = '';
      categorie.value = '';
      leeftijd.value = '';
      locatie.value = '';
      moeilijk.value = '';
      renderFiches(alleFiches);
    });
  }

  // ── Nieuw fiche formulier ──
  function initialiseerFormulier() {
    document.getElementById('nieuwe-fiche-knop').addEventListener('click', () => {
      bewerkFicheID = null;
      document.getElementById('fiche-formulier').reset();
      document.getElementById('nieuwe-fiche-titel').textContent = 'Nieuwe fiche aanmaken';
      document.getElementById('fiche-indienen-knop').textContent =
        isBeheerder ? 'Fiche toevoegen' : 'Fiche indienen';
      openModal('nieuwe-fiche-overlay');
    });

    document.getElementById('fiche-annuleren').addEventListener('click', () => {
      bewerkFicheID = null;
      sluitModal('nieuwe-fiche-overlay');
    });

    document.getElementById('fiche-formulier').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = leesFormulierWaarden();
      if (!data) return;

      let succes;
      if (bewerkFicheID) {
        // Bewerk-modus: update bestaande fiche
        succes = await werkFicheBij(bewerkFicheID, data);
      } else {
        // Nieuw: voorstel of meteen goedgekeurd
        succes = await slaFicheVoorstelOp(data, huidigProfiel.id, isBeheerder);
      }

      if (succes) {
        sluitModal('nieuwe-fiche-overlay');
        document.getElementById('fiche-formulier').reset();
        bewerkFicheID = null;
        await laadFiches();
      }
    });
  }

  // ── Foto upload / verwijder handlers ───────────────────────────────
  window._handleFotoUpload = async (input, ficheIDJson) => {
    const ficheID = JSON.parse(ficheIDJson);
    const bestand = input.files?.[0];
    if (!bestand) return;
    input.disabled = true;
    try {
      const url = await uploadFichesFoto(ficheID, bestand);
      if (url) {
        toonToast('Foto geüpload.', 'succes');
        const fiche  = await haalFicheOp(ficheID);
        const raster = document.getElementById(`fotos-raster-${ficheID}`);
        // innerHTML i.p.v. outerHTML: zo blijft het element met zijn id in de DOM
        if (raster && fiche) raster.innerHTML = renderFotosRaster(fiche.fotos ?? [], ficheID, isBeheerder);
      }
    } catch (e) {
      console.error('[fiches] upload:', e.message);
      toonToast('Upload mislukt: ' + e.message, 'fout');
    } finally {
      input.value    = '';
      input.disabled = false;
    }
  };

  window._verwijderFichesFoto = async (ficheIDJson, publicUrlJson) => {
    const ficheID   = JSON.parse(ficheIDJson);
    const publicUrl = JSON.parse(publicUrlJson);
    try {
      await verwijderFichesFoto(ficheID, publicUrl);
      // Geen toonToast hier — verwijderFichesFoto toont zelf al de melding
      const fiche  = await haalFicheOp(ficheID);
      const raster = document.getElementById(`fotos-raster-${ficheID}`);
      // innerHTML i.p.v. outerHTML: zo blijft het element met zijn id in de DOM
      if (raster && fiche) raster.innerHTML = renderFotosRaster(fiche.fotos ?? [], ficheID, isBeheerder);
    } catch (e) {
      console.error('[fiches] verwijderFoto:', e.message);
      toonToast('Verwijderen mislukt.', 'fout');
    }
  };

  init();
</script>
</body>
</html>
