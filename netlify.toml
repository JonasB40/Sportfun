# Netlify-configuratie voor het SportFun Lesgeversportaal
#
# Dit is een statische site (HTML/CSS/JS) met Supabase als backend.
# Er is geen build-stap nodig: Netlify serveert de bestanden uit de hoofdmap.

[build]
  publish = "."
  command = ""

# Beveiligingsheaders voor alle pagina's
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Forceer HTTPS gedurende 1 jaar (site bevat logins)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"

# Houd .sql-bestanden uit zoekmachines. Let op: dit BLOKKEERT geen
# toegang — het de-indexeert alleen. Echte blokkering per extensie kan
# Netlify niet betrouwbaar (een '*' mag enkel aan het einde van een pad
# staan, niet als '/*.sql'). Deze bestanden staan toch al publiek op
# GitHub; de echte beveiliging zit in RLS op de database.
[[headers]]
  for = "/*.sql"
  [headers.values]
    X-Robots-Tag = "noindex"
